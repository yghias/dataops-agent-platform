name: deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run workflow tests
        run: python -m compileall src agents workflows tools memory tests airflow
      - name: Build container image
        run: docker build -t dataops-agent-platform:${GITHUB_SHA} .
      - name: Publish deployment note
        run: |
          echo "Deployment target should be bound to protected staging and production environments."
          echo "Snowflake and Airflow credentials must be injected by environment-level secrets."
