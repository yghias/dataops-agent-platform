name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall agents workflows tools memory
      - name: Ruff
        run: ruff check agents workflows tools memory
      - name: Pytest
        run: pytest -q
      - name: Validate SQL assets
        run: test -f models/marts/mart_sales_pipeline.sql && test -f sql/tests/test_pipeline_amount_non_negative.sql
