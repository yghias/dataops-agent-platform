version: 2

models:
  - name: stg_crm_accounts
    columns:
      - name: account_id
        tests: [not_null, unique]

  - name: stg_crm_opportunities
    columns:
      - name: opportunity_id
        tests: [not_null, unique]
      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_crm_accounts')
              field: account_id

  - name: mart_sales_pipeline
    columns:
      - name: snapshot_date
        tests: [not_null]
      - name: pipeline_amount
        tests: [not_null]

  - name: stg_pipeline_runs
    columns:
      - name: run_id
        tests: [not_null, unique]
      - name: pipeline_id
        tests: [not_null]

  - name: stg_query_history
    columns:
      - name: query_id
        tests: [not_null, unique]
      - name: query_hash
        tests: [not_null]

  - name: stg_agent_tasks
    columns:
      - name: task_id
        tests: [not_null, unique]

  - name: pipeline_health_mart
    columns:
      - name: pipeline_id
        tests: [not_null]
      - name: pipeline_success_rate
        tests: [not_null]

  - name: data_quality_mart
    columns:
      - name: asset_name
        tests: [not_null]
      - name: data_quality_score
        tests: [not_null]
